spring.application.name=SpringAICode
spring.ai.openai.api-key=
#spring.ai.ollama.chat.model:mistral:latest
spring.ai.openai.embedding.options.model=text-embedding-ada-002


#pg-vector
spring.datasource.url=jdbc:postgresql://localhost:5432/SpringAI
spring.datasource.username=postgres
spring.datasource.password=1234

spring.jpa.show-sql=true
spring.datasource.driver-class-name=org.postgresql.Driver

#redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.ai.vectorstore.redis.index-name=product-index
spring-ai.vectorstore.redis.prefix=product

spring.main.allow-bean-definition-overriding=true

spring.sql.init.schema-locations=classpath:init/schema.sql
spring.sql.init.mode=always


